services:
  postgres:
    image: postgres:16-alpine
    container_name: estoque-inox-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?defina DB_NAME no .env}
      POSTGRES_USER: ${DB_USER:?defina DB_USER no .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD no .env}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: estoque-inox-prod-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_HOST: ${DB_HOST:?defina DB_HOST no .env}
      DB_PORT: ${DB_PORT:?defina DB_PORT no .env}
      DB_NAME: ${DB_NAME:?defina DB_NAME no .env}
      DB_USER: ${DB_USER:?defina DB_USER no .env}
      DB_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD no .env}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-false}
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"

volumes:
  postgres_prod_data:
