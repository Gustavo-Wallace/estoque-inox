<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="min-vh-100 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h3 fw-bold mb-3">Area administrativa</h1>
                        <p class="text-secondary mb-3">Atalhos administrativos do sistema.</p>
                        <p class="mb-4">
                            Usuario: <strong th:text="${username}">usuario</strong><br>
                            Perfil: <strong th:text="${roles}">ADMIN</strong>
                        </p>
                        <div class="d-grid gap-2">
                            <a th:href="@{/admin/produtos}" class="btn btn-primary btn-touch">Produtos</a>
                            <a th:href="@{/admin/categorias}" class="btn btn-outline-primary btn-touch">Categorias</a>
                            <a th:href="@{/admin/estoque}" class="btn btn-outline-primary btn-touch">Estoque</a>
                            <a th:href="@{/admin/relatorios}" class="btn btn-outline-primary btn-touch">Relatorios</a>
                            <a th:href="@{/admin/usuarios}" class="btn btn-outline-primary btn-touch">Usuarios</a>
                            <a th:href="@{/dashboard}" class="btn btn-outline-secondary btn-touch">Voltar ao painel</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
