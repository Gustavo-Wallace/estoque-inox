<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Categorias - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="d-flex flex-column flex-sm-row justify-content-between gap-3 mb-4">
            <div>
                <h1 class="fw-bold mb-1">Categorias</h1>
                <p class="text-secondary mb-0">Gerenciamento administrativo de categorias.</p>
            </div>
            <div class="d-grid d-sm-flex gap-2">
                <a th:href="@{/dashboard}" class="btn btn-outline-primary">Painel</a>
                <a th:href="@{/admin/categorias/nova}" class="btn btn-primary">Nova categoria</a>
            </div>
        </div>

        <div th:if="${sucesso}" class="alert alert-success" role="alert" th:text="${sucesso}"></div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Nome</th>
                            <th scope="col">Status</th>
                            <th scope="col">Ações</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="categoria : ${categorias}">
                            <td th:text="${categoria.id}">1</td>
                            <td class="fw-semibold" th:text="${categoria.nome}">Categoria</td>
                            <td>
                                <span th:if="${categoria.ativa}" class="badge text-bg-success">Ativa</span>
                                <span th:unless="${categoria.ativa}" class="badge text-bg-secondary">Inativa</span>
                            </td>
                            <td>
                                <div class="d-grid d-sm-flex gap-2">
                                    <a th:href="@{/admin/categorias/{id}/editar(id=${categoria.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                                    <form th:action="@{/admin/categorias/{id}/alternar-status(id=${categoria.id})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-secondary w-100"
                                                th:text="${categoria.ativa} ? 'Desativar' : 'Ativar'">Alternar</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categorias)}">
                            <td colspan="4" class="text-center text-secondary py-4">Nenhuma categoria cadastrada.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
