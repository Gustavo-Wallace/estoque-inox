<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Entrada de Estoque - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="min-vh-100 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-7">
                <div class="mb-4">
                    <h1 class="fw-bold mb-1">Entrada de estoque</h1>
                    <p class="text-secondary mb-0">Adicione unidades ao estoque atual de um produto.</p>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form th:action="@{/admin/estoque/entrada}" th:object="${entradaEstoqueForm}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" role="alert">
                                <p class="mb-0" th:each="erro : ${#fields.globalErrors()}" th:text="${erro}">Erro</p>
                            </div>

                            <div class="mb-3">
                                <label for="produtoId" class="form-label">Produto</label>
                                <select th:field="*{produtoId}" class="form-select" th:errorclass="is-invalid" id="produtoId" required>
                                    <option value="">Selecione</option>
                                    <option th:each="produto : ${produtos}"
                                            th:value="${produto.id}"
                                            th:text="${produto.codigo + ' - ' + produto.nome + ' (estoque: ' + produto.quantidadeEstoque + ')'}">
                                        Produto
                                    </option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('produtoId')}" th:errors="*{produtoId}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="quantidade" class="form-label">Quantidade</label>
                                <input type="number" th:field="*{quantidade}" class="form-control" th:errorclass="is-invalid" id="quantidade" min="1" step="1" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('quantidade')}" th:errors="*{quantidade}"></div>
                            </div>

                            <div class="mb-4">
                                <label for="observacao" class="form-label">Observação</label>
                                <textarea th:field="*{observacao}" class="form-control" th:errorclass="is-invalid" id="observacao" rows="3" maxlength="255"></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('observacao')}" th:errors="*{observacao}"></div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Registrar entrada</button>
                                <a th:href="@{/admin/estoque}" class="btn btn-outline-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
