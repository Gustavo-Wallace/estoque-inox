<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Histórico de Estoque - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="d-flex flex-column flex-sm-row justify-content-between gap-3 mb-4">
            <div>
                <h1 class="fw-bold mb-1" th:text="${produto.nome}">Produto</h1>
                <p class="text-secondary mb-0">
                    Código <strong th:text="${produto.codigo}">COD</strong>
                    · Estoque atual <strong th:text="${produto.quantidadeEstoque}">0</strong>
                </p>
            </div>
            <div class="d-grid d-sm-flex gap-2">
                <a th:href="@{/admin/produtos}" class="btn btn-outline-primary btn-touch">Produtos</a>
                <a th:href="@{/admin/estoque/entrada(produtoId=${produto.id})}" class="btn btn-primary btn-touch">Entrada</a>
                <a th:href="@{/admin/estoque/ajuste(produtoId=${produto.id})}" class="btn btn-outline-primary btn-touch">Ajuste</a>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th scope="col">Data/hora</th>
                            <th scope="col">Tipo</th>
                            <th scope="col">Qtd.</th>
                            <th scope="col">Antes</th>
                            <th scope="col">Depois</th>
                            <th scope="col">Usuário</th>
                            <th scope="col">Observação</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="movimentacao : ${movimentacoes}">
                            <td th:text="${#temporals.format(movimentacao.criadoEm, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:00</td>
                            <td th:text="${movimentacao.tipo.descricao}">Entrada</td>
                            <td th:text="${movimentacao.quantidade}">0</td>
                            <td th:text="${movimentacao.estoqueAnterior}">0</td>
                            <td th:text="${movimentacao.estoquePosterior}">0</td>
                            <td th:text="${movimentacao.usuarioResponsavel}">admin</td>
                            <td th:text="${movimentacao.observacao ?: '-'}">-</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(movimentacoes)}">
                            <td colspan="7" class="text-center text-secondary py-4">Nenhuma movimentação registrada para este produto.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
