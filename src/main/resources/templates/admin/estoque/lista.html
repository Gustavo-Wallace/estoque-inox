<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Estoque - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="d-flex flex-column flex-sm-row justify-content-between gap-3 mb-4">
            <div>
                <h1 class="fw-bold mb-1">Estoque</h1>
                <p class="text-secondary mb-0">Histórico de movimentações de estoque.</p>
            </div>
            <div class="d-grid d-sm-flex gap-2">
                <a th:href="@{/dashboard}" class="btn btn-outline-primary">Painel</a>
                <a th:href="@{/admin/estoque/entrada}" class="btn btn-primary">Entrada</a>
                <a th:href="@{/admin/estoque/ajuste}" class="btn btn-outline-primary">Ajuste</a>
            </div>
        </div>

        <div th:if="${sucesso}" class="alert alert-success" role="alert" th:text="${sucesso}"></div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th scope="col">Data/hora</th>
                            <th scope="col">Produto</th>
                            <th scope="col">Código</th>
                            <th scope="col">Tipo</th>
                            <th scope="col">Qtd.</th>
                            <th scope="col">Antes</th>
                            <th scope="col">Depois</th>
                            <th scope="col">Usuário</th>
                            <th scope="col">Observação</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="movimentacao : ${movimentacoes}">
                            <td th:text="${#temporals.format(movimentacao.criadoEm, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:00</td>
                            <td th:text="${movimentacao.produto.nome}">Produto</td>
                            <td class="fw-semibold" th:text="${movimentacao.produto.codigo}">COD</td>
                            <td th:text="${movimentacao.tipo.descricao}">Entrada</td>
                            <td th:text="${movimentacao.quantidade}">0</td>
                            <td th:text="${movimentacao.estoqueAnterior}">0</td>
                            <td th:text="${movimentacao.estoquePosterior}">0</td>
                            <td th:text="${movimentacao.usuarioResponsavel}">admin</td>
                            <td th:text="${movimentacao.observacao ?: '-'}">-</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(movimentacoes)}">
                            <td colspan="9" class="text-center text-secondary py-4">Nenhuma movimentação registrada.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
