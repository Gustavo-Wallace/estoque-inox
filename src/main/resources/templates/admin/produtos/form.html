<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo} + ' - Estoque Inox'">Produto - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <div class="mb-4">
                    <h1 class="fw-bold mb-1" th:text="${titulo}">Produto</h1>
                    <p class="text-secondary mb-0">Informe os dados do produto.</p>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form th:action="${formAction}" th:object="${produtoForm}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="row g-3">
                                <div class="col-12 col-md-4">
                                    <label for="codigo" class="form-label">Código</label>
                                    <input type="text" th:field="*{codigo}" class="form-control" th:errorclass="is-invalid" id="codigo" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}"></div>
                                </div>

                                <div class="col-12 col-md-8">
                                    <label for="nome" class="form-label">Nome</label>
                                    <input type="text" th:field="*{nome}" class="form-control" th:errorclass="is-invalid" id="nome" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                                </div>

                                <div class="col-12">
                                    <label for="descricao" class="form-label">Descrição</label>
                                    <textarea th:field="*{descricao}" class="form-control" id="descricao" rows="3"></textarea>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="categoriaId" class="form-label">Categoria</label>
                                    <select th:field="*{categoriaId}" class="form-select" th:errorclass="is-invalid" id="categoriaId" required>
                                        <option value="">Selecione</option>
                                        <option th:each="categoria : ${categorias}"
                                                th:value="${categoria.id}"
                                                th:text="${categoria.ativa ? categoria.nome : categoria.nome + ' (inativa)'}">
                                            Categoria
                                        </option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('categoriaId')}" th:errors="*{categoriaId}"></div>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="ativo" class="form-label">Status</label>
                                    <select th:field="*{ativo}" class="form-select" id="ativo">
                                        <option th:value="true">Ativo</option>
                                        <option th:value="false">Inativo</option>
                                    </select>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="precoCusto" class="form-label">Preço de custo</label>
                                    <input type="number" th:field="*{precoCusto}" class="form-control" th:errorclass="is-invalid" id="precoCusto" min="0" step="0.01">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('precoCusto')}" th:errors="*{precoCusto}"></div>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="precoVenda" class="form-label">Preço de venda</label>
                                    <input type="number" th:field="*{precoVenda}" class="form-control" th:errorclass="is-invalid" id="precoVenda" min="0" step="0.01" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('precoVenda')}" th:errors="*{precoVenda}"></div>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="quantidadeEstoque" class="form-label">Quantidade em estoque</label>
                                    <input type="number" th:field="*{quantidadeEstoque}" class="form-control" th:errorclass="is-invalid" id="quantidadeEstoque" min="0" step="1" th:readonly="${edicao}" required>
                                    <div th:if="${edicao}" class="form-text">Em produtos existentes, altere o estoque por Entrada ou Ajuste.</div>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('quantidadeEstoque')}" th:errors="*{quantidadeEstoque}"></div>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="estoqueMinimo" class="form-label">Estoque mínimo</label>
                                    <input type="number" th:field="*{estoqueMinimo}" class="form-control" th:errorclass="is-invalid" id="estoqueMinimo" min="0" step="1" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('estoqueMinimo')}" th:errors="*{estoqueMinimo}"></div>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary">Salvar</button>
                                <a th:href="@{/admin/produtos}" class="btn btn-outline-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
