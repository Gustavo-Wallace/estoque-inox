<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Produtos - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="d-flex flex-column flex-sm-row justify-content-between gap-3 mb-4">
            <div>
                <h1 class="fw-bold mb-1">Produtos</h1>
                <p class="text-secondary mb-0">Gerenciamento administrativo de produtos.</p>
            </div>
            <div class="d-grid d-sm-flex gap-2">
                <a th:href="@{/dashboard}" class="btn btn-outline-primary">Painel</a>
                <a th:href="@{/admin/produtos/novo}" class="btn btn-primary">Novo produto</a>
            </div>
        </div>

        <div th:if="${sucesso}" class="alert alert-success" role="alert" th:text="${sucesso}"></div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th scope="col">Código</th>
                            <th scope="col">Nome</th>
                            <th scope="col">Categoria</th>
                            <th scope="col">Preço venda</th>
                            <th scope="col">Estoque</th>
                            <th scope="col">Mínimo</th>
                            <th scope="col">Status</th>
                            <th scope="col">Ações</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="produto : ${produtos}">
                            <td class="fw-semibold" th:text="${produto.codigo}">COD-001</td>
                            <td th:text="${produto.nome}">Produto</td>
                            <td th:text="${produto.categoria.nome}">Categoria</td>
                            <td th:text="${#numbers.formatCurrency(produto.precoVenda)}">R$ 0,00</td>
                            <td th:text="${produto.quantidadeEstoque}">0</td>
                            <td th:text="${produto.estoqueMinimo}">0</td>
                            <td>
                                <span th:if="${produto.ativo}" class="badge text-bg-success">Ativo</span>
                                <span th:unless="${produto.ativo}" class="badge text-bg-secondary">Inativo</span>
                            </td>
                            <td>
                                <div class="d-grid d-sm-flex gap-2">
                                    <a th:href="@{/admin/produtos/{id}/editar(id=${produto.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                                    <form th:action="@{/admin/produtos/{id}/alternar-status(id=${produto.id})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-secondary w-100"
                                                th:text="${produto.ativo} ? 'Desativar' : 'Ativar'">Alternar</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(produtos)}">
                            <td colspan="8" class="text-center text-secondary py-4">Nenhum produto cadastrado.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
