<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Estoque Baixo - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="d-flex flex-column flex-sm-row justify-content-between gap-3 mb-4">
            <div>
                <h1 class="fw-bold mb-1">Estoque baixo</h1>
                <p class="text-secondary mb-0">Produtos ativos com estoque atual menor ou igual ao minimo.</p>
            </div>
            <a th:href="@{/admin/relatorios}" class="btn btn-outline-primary btn-lg align-self-sm-start">Relatorios</a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Codigo</th>
                            <th>Produto</th>
                            <th>Categoria</th>
                            <th>Estoque atual</th>
                            <th>Estoque minimo</th>
                            <th>Preco venda</th>
                            <th>Status</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="produto : ${produtos}">
                            <td class="fw-semibold" th:text="${produto.codigo}">COD</td>
                            <td th:text="${produto.nome}">Produto</td>
                            <td th:text="${produto.categoria.nome}">Categoria</td>
                            <td th:text="${produto.quantidadeEstoque}">0</td>
                            <td th:text="${produto.estoqueMinimo}">0</td>
                            <td th:text="${#numbers.formatCurrency(produto.precoVenda)}">R$ 0,00</td>
                            <td>
                                <span th:if="${produto.quantidadeEstoque == 0}" class="badge text-bg-danger">sem estoque</span>
                                <span th:if="${produto.quantidadeEstoque > 0}" class="badge text-bg-warning">atenção</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(produtos)}">
                            <td colspan="7" class="text-center text-secondary py-4">Nenhum produto com estoque baixo.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
