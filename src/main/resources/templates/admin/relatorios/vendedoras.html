<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vendas por Vendedora - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="d-flex flex-column flex-sm-row justify-content-between gap-3 mb-4">
            <div>
                <h1 class="fw-bold mb-1">Vendas por vendedora</h1>
                <p class="text-secondary mb-0">Totais calculados apenas com itens nao cancelados.</p>
            </div>
            <a th:href="@{/admin/relatorios}" class="btn btn-outline-primary btn-lg align-self-sm-start">Relatorios</a>
        </div>

        <form th:action="@{/admin/relatorios/vendedoras}" method="get" class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <div class="row g-3 align-items-end">
                    <div class="col-12 col-md-5">
                        <label for="dataInicial" class="form-label">Data inicial</label>
                        <input type="date" class="form-control form-control-lg" id="dataInicial" name="dataInicial" th:value="${periodo.dataInicial}">
                    </div>
                    <div class="col-12 col-md-5">
                        <label for="dataFinal" class="form-label">Data final</label>
                        <input type="date" class="form-control form-control-lg" id="dataFinal" name="dataFinal" th:value="${periodo.dataFinal}">
                    </div>
                    <div class="col-12 col-md-2 d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Filtrar</button>
                    </div>
                </div>
            </div>
        </form>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Usuario</th>
                            <th>Vendas registradas</th>
                            <th>Itens vendidos</th>
                            <th>Total liquido</th>
                            <th>Canceladas/parciais</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="vendedora : ${vendedoras}">
                            <td class="fw-semibold" th:text="${vendedora.usuarioResponsavel}">usuario</td>
                            <td th:text="${vendedora.quantidadeVendasRegistradas}">0</td>
                            <td th:text="${vendedora.itensVendidos}">0</td>
                            <td class="fw-semibold" th:text="${#numbers.formatCurrency(vendedora.totalLiquido)}">R$ 0,00</td>
                            <td th:text="${vendedora.vendasCanceladasOuParciais}">0</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(vendedoras)}">
                            <td colspan="5" class="text-center text-secondary py-4">Nenhuma venda no periodo.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
