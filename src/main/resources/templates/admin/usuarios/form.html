<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo + ' - Estoque Inox'}">Usuario - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="mx-auto" style="max-width: 760px;">
            <div class="mb-4">
                <h1 class="fw-bold mb-1" th:text="${titulo}">Usuario</h1>
                <p class="text-secondary mb-0">Preencha os dados de acesso. A senha nao aparece depois de salva.</p>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{${formAction}}" th:object="${usuarioForm}" method="post" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" role="alert">
                            <p class="mb-0" th:each="erro : ${#fields.globalErrors()}" th:text="${erro}">Erro</p>
                        </div>

                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome</label>
                            <input type="text" th:field="*{nome}" class="form-control form-control-lg" th:errorclass="is-invalid" id="nome" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" th:field="*{username}" class="form-control form-control-lg" th:errorclass="is-invalid" id="username" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3" th:if="${novo}">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" th:field="*{senha}" class="form-control form-control-lg" id="senha" autocomplete="new-password" required>
                            <div class="form-text">A senha sera salva com criptografia BCrypt.</div>
                        </div>

                        <div class="mb-3">
                            <label for="perfil" class="form-label">Perfil</label>
                            <select th:field="*{perfil}" class="form-select form-select-lg" th:errorclass="is-invalid" id="perfil" required>
                                <option value="">Selecione</option>
                                <option th:each="perfil : ${perfis}" th:value="${perfil}" th:text="${perfil}">ADMIN</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('perfil')}" th:errors="*{perfil}"></div>
                        </div>

                        <div class="form-check form-switch mb-4">
                            <input type="checkbox" th:field="*{ativo}" class="form-check-input" role="switch" id="ativo">
                            <label for="ativo" class="form-check-label">Usuario ativo</label>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Salvar</button>
                            <a th:href="@{/admin/usuarios}" class="btn btn-outline-secondary btn-lg">Voltar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
