<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuarios - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="d-flex flex-column flex-sm-row justify-content-between gap-3 mb-4">
            <div>
                <h1 class="fw-bold mb-1">Usuarios</h1>
                <p class="text-secondary mb-0">Gerencie acessos de administradoras e vendedoras.</p>
            </div>
            <div class="d-grid d-sm-flex gap-2">
                <a th:href="@{/dashboard}" class="btn btn-outline-primary btn-lg btn-touch">Painel</a>
                <a th:href="@{/admin/usuarios/novo}" class="btn btn-primary btn-lg btn-touch">Novo usuario</a>
            </div>
        </div>

        <div th:if="${sucesso}" class="alert alert-success" role="alert" th:text="${sucesso}"></div>
        <div th:if="${erro}" class="alert alert-danger" role="alert" th:text="${erro}"></div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Nome</th>
                            <th>Username</th>
                            <th>Perfil</th>
                            <th>Status</th>
                            <th>Acoes</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="usuario : ${usuarios}">
                            <td class="fw-semibold" th:text="${usuario.nome}">Nome</td>
                            <td th:text="${usuario.username}">username</td>
                            <td th:text="${usuario.perfil}">ADMIN</td>
                            <td>
                                <span th:if="${usuario.ativo}" class="badge text-bg-success">ativo</span>
                                <span th:unless="${usuario.ativo}" class="badge text-bg-secondary">inativo</span>
                            </td>
                            <td>
                                <div class="d-flex flex-column flex-lg-row gap-2">
                                    <a th:href="@{/admin/usuarios/{id}/editar(id=${usuario.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                                    <a th:href="@{/admin/usuarios/{id}/senha(id=${usuario.id})}" class="btn btn-sm btn-outline-secondary">Senha</a>
                                    <form th:action="@{/admin/usuarios/{id}/alternar-status(id=${usuario.id})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit"
                                                th:class="${usuario.ativo} ? 'btn btn-sm btn-outline-danger w-100' : 'btn btn-sm btn-outline-success w-100'"
                                                th:text="${usuario.ativo} ? 'Desativar' : 'Ativar'">Status</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(usuarios)}">
                            <td colspan="5" class="text-center text-secondary py-4">Nenhum usuario cadastrado.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
