<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Alterar Senha - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="mx-auto" style="max-width: 680px;">
            <div class="mb-4">
                <h1 class="fw-bold mb-1">Alterar senha</h1>
                <p class="text-secondary mb-0">
                    Usuario:
                    <strong th:text="${usuario.nome + ' (' + usuario.username + ')'}">Usuario</strong>
                </p>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/admin/usuarios/{id}/senha(id=${usuario.id})}" th:object="${alterarSenhaUsuarioForm}" method="post" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-4">
                            <label for="novaSenha" class="form-label">Nova senha</label>
                            <input type="password" th:field="*{novaSenha}" class="form-control form-control-lg" th:errorclass="is-invalid" id="novaSenha" autocomplete="new-password" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('novaSenha')}" th:errors="*{novaSenha}"></div>
                            <div class="form-text">Use pelo menos 6 caracteres.</div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Alterar senha</button>
                            <a th:href="@{/admin/usuarios}" class="btn btn-outline-secondary btn-lg">Voltar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
