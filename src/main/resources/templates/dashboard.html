<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <header class="mb-4">
                    <h1 class="fw-bold mb-2">Estoque Inox</h1>
                    <p class="lead text-secondary mb-3">Bem-vindo ao painel</p>
                    <div class="d-flex flex-column flex-sm-row gap-2">
                        <span class="badge text-bg-light border text-secondary align-self-start">
                            Usuario: <span th:text="${username}">usuario</span>
                        </span>
                        <span class="badge text-bg-light border text-secondary align-self-start">
                            Perfil: <span th:text="${roles}">PERFIL</span>
                        </span>
                    </div>
                </header>

                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <a th:href="@{/vendas}" class="card border-0 shadow-sm text-decoration-none h-100">
                            <div class="card-body p-4">
                                <h2 class="h5 text-dark mb-2">Area de vendas</h2>
                                <p class="text-secondary mb-0">Acesso inicial para validar permissoes.</p>
                            </div>
                        </a>
                    </div>

                    <div class="col-12 col-md-6" th:if="${isAdmin}">
                        <a th:href="@{/admin}" class="card border-0 shadow-sm text-decoration-none h-100">
                            <div class="card-body p-4">
                                <h2 class="h5 text-dark mb-2">Area administrativa</h2>
                                <p class="text-secondary mb-0">Disponivel apenas para ADMIN.</p>
                            </div>
                        </a>
                    </div>

                    <div class="col-12 col-md-6" th:unless="${isAdmin}">
                        <div class="card border-0 shadow-sm h-100 opacity-75">
                            <div class="card-body p-4">
                                <h2 class="h5 text-dark mb-2">Area administrativa</h2>
                                <p class="text-secondary mb-0">Disponivel apenas para ADMIN.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <form th:action="@{/logout}" method="post" class="mt-4">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-danger w-100">Sair</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
