<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="min-vh-100 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                <section class="text-center mb-4">
                    <h1 class="fw-bold mb-3">Estoque Inox</h1>
                    <p class="lead text-secondary mb-0">
                        Controle simples de estoque e vendas para bijuterias de aço inox.
                    </p>
                </section>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 text-center">
                        <p class="mb-4 fs-5">Sistema em desenvolvimento.</p>
                        <button type="button" class="btn btn-primary px-4" disabled>Em breve</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
