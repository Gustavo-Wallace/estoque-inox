<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="min-vh-100 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5">
                <section class="text-center mb-4">
                    <h1 class="fw-bold mb-2">Estoque Inox</h1>
                    <p class="text-secondary mb-0">Acesse sua conta para continuar.</p>
                </section>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div th:if="${param.error}" class="alert alert-danger" role="alert">
                            Usuario ou senha invalidos.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success" role="alert">
                            Logout realizado com sucesso.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="mb-3">
                                <label for="username" class="form-label">Usuario</label>
                                <input type="text" class="form-control" id="username" name="username" autocomplete="username" required autofocus>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Entrar</button>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a th:href="@{/}" class="text-decoration-none">Voltar para a pagina inicial</a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
