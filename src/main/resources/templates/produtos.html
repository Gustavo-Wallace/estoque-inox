<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Produtos - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="d-flex flex-column flex-sm-row justify-content-between gap-3 mb-4">
            <div>
                <h1 class="fw-bold mb-1">Produtos</h1>
                <p class="text-secondary mb-0">Lista temporária para validar banco e dados iniciais.</p>
            </div>
            <a th:href="@{/dashboard}" class="btn btn-outline-primary align-self-sm-start">Voltar ao painel</a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th scope="col">Código</th>
                            <th scope="col">Nome</th>
                            <th scope="col">Categoria</th>
                            <th scope="col">Preço venda</th>
                            <th scope="col">Estoque</th>
                            <th scope="col">Mínimo</th>
                            <th scope="col">Status</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="produto : ${produtos}">
                            <td class="fw-semibold" th:text="${produto.codigo}">COD-001</td>
                            <td th:text="${produto.nome}">Produto</td>
                            <td th:text="${produto.categoria.nome}">Categoria</td>
                            <td th:text="${#numbers.formatCurrency(produto.precoVenda)}">R$ 0,00</td>
                            <td th:text="${produto.quantidadeEstoque}">0</td>
                            <td th:text="${produto.estoqueMinimo}">0</td>
                            <td>
                                <span th:if="${produto.ativo}" class="badge text-bg-success">Ativo</span>
                                <span th:unless="${produto.ativo}" class="badge text-bg-secondary">Inativo</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(produtos)}">
                            <td colspan="7" class="text-center text-secondary py-4">Nenhum produto cadastrado.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
