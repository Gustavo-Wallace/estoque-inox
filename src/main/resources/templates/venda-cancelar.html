<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cancelar Venda - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="min-vh-100 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-7">
                <div class="mb-4">
                    <h1 class="fw-bold mb-1">Cancelar venda</h1>
                    <p class="text-secondary mb-0">O estoque será estornado automaticamente.</p>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <dl class="row mb-4">
                            <dt class="col-sm-4">Produto</dt>
                            <dd class="col-sm-8" th:text="${venda.produto.nome}">Produto</dd>

                            <dt class="col-sm-4">Código</dt>
                            <dd class="col-sm-8" th:text="${venda.produto.codigo}">COD</dd>

                            <dt class="col-sm-4">Quantidade</dt>
                            <dd class="col-sm-8" th:text="${venda.quantidade}">1</dd>

                            <dt class="col-sm-4">Valor total</dt>
                            <dd class="col-sm-8" th:text="${#numbers.formatCurrency(venda.valorTotal)}">R$ 0,00</dd>

                            <dt class="col-sm-4">Pagamento</dt>
                            <dd class="col-sm-8" th:text="${venda.formaPagamento}">PIX</dd>

                            <dt class="col-sm-4">Data da venda</dt>
                            <dd class="col-sm-8" th:text="${#temporals.format(venda.criadoEm, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:00</dd>

                            <dt class="col-sm-4">Usuária</dt>
                            <dd class="col-sm-8" th:text="${venda.usuarioResponsavel}">usuario</dd>
                        </dl>

                        <form th:action="@{/vendas/{id}/cancelar(id=${venda.id})}" th:object="${cancelamentoVendaForm}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="alert alert-warning" role="alert">
                                O estoque será estornado automaticamente.
                            </div>

                            <div class="mb-4">
                                <label for="motivoCancelamento" class="form-label">Motivo do cancelamento</label>
                                <textarea th:field="*{motivoCancelamento}" class="form-control" th:errorclass="is-invalid" id="motivoCancelamento" rows="3" maxlength="255"></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('motivoCancelamento')}" th:errors="*{motivoCancelamento}"></div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-danger btn-lg">Confirmar cancelamento</button>
                                <a th:href="@{/vendas}" class="btn btn-outline-secondary">Voltar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
