<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cancelar quantidade - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="mx-auto" style="max-width: 760px;">
            <div class="mb-4">
                <h1 class="fw-bold mb-1">Cancelar quantidade</h1>
                <p class="text-secondary mb-0" th:text="'Venda #' + ${venda.id}">Venda #1</p>
            </div>

            <section class="card border-0 shadow-sm mb-3">
                <div class="card-body p-4">
                    <h2 class="h5 fw-bold mb-3">Produto</h2>
                    <p class="fw-semibold mb-1" th:text="${item.produto.codigo}">COD</p>
                    <p class="mb-3" th:text="${item.produto.nome}">Produto</p>

                    <div class="row g-3">
                        <div class="col-4">
                            <span class="metric-label">Vendida</span>
                            <span class="metric-value fs-5" th:text="${item.quantidade}">1</span>
                        </div>
                        <div class="col-4">
                            <span class="metric-label">Ja cancelada</span>
                            <span class="metric-value fs-5" th:text="${item.quantidadeCancelada}">0</span>
                        </div>
                        <div class="col-4">
                            <span class="metric-label">Restante</span>
                            <span class="metric-value fs-5" th:text="${item.quantidadeAtiva}">1</span>
                        </div>
                        <div class="col-6">
                            <span class="metric-label">Preco final</span>
                            <span class="metric-value" th:text="${#numbers.formatCurrency(item.precoFinalUnitario)}">R$ 0,00</span>
                        </div>
                        <div class="col-6">
                            <span class="metric-label">Subtotal ativo</span>
                            <span class="metric-value" th:text="${#numbers.formatCurrency(item.valorTotalFinalAtivo)}">R$ 0,00</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/vendas/{vendaId}/itens/{itemId}/cancelar(vendaId=${venda.id},itemId=${item.id})}" th:object="${cancelamentoVendaItemForm}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="alert alert-warning" role="alert">
                            A quantidade cancelada voltara ao estoque.
                        </div>

                        <div class="mb-4">
                            <label for="quantidadeCancelar" class="form-label">Quantidade a cancelar</label>
                            <input type="number"
                                   th:field="*{quantidadeCancelar}"
                                   class="form-control form-control-lg"
                                   th:errorclass="is-invalid"
                                   id="quantidadeCancelar"
                                   min="1"
                                   th:max="${item.quantidadeAtiva}"
                                   step="1"
                                   inputmode="numeric"
                                   required>
                            <div class="form-text" th:text="'Voce pode cancelar no maximo ' + ${item.quantidadeAtiva} + ' unidade(s).'">Limite</div>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('quantidadeCancelar')}" th:errors="*{quantidadeCancelar}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="motivoCancelamento" class="form-label">Motivo opcional</label>
                            <textarea th:field="*{motivoCancelamento}" class="form-control" th:errorclass="is-invalid" id="motivoCancelamento" rows="3" maxlength="255"></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('motivoCancelamento')}" th:errors="*{motivoCancelamento}"></div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg btn-touch">Confirmar cancelamento</button>
                            <a th:href="@{/vendas/{id}(id=${venda.id})}" class="btn btn-outline-secondary btn-lg btn-touch">Voltar</a>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </div>
</main>
</body>
</html>
