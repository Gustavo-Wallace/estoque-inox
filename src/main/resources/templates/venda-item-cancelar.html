<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cancelar Item - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="mx-auto" style="max-width: 760px;">
            <div class="mb-4">
                <h1 class="fw-bold mb-1">Cancelar item</h1>
                <p class="text-secondary mb-0" th:text="'Venda #' + ${venda.id}">Venda #1</p>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <dl class="row mb-4">
                        <dt class="col-sm-4">Produto</dt>
                        <dd class="col-sm-8">
                            <span class="fw-semibold" th:text="${item.produto.codigo}">COD</span>
                            <span th:text="' - ' + ${item.produto.nome}">Produto</span>
                        </dd>

                        <dt class="col-sm-4">Quantidade</dt>
                        <dd class="col-sm-8" th:text="${item.quantidade}">1</dd>

                        <dt class="col-sm-4">Preco unitario</dt>
                        <dd class="col-sm-8" th:text="${#numbers.formatCurrency(item.precoUnitario)}">R$ 0,00</dd>

                        <dt class="col-sm-4">Total do item</dt>
                        <dd class="col-sm-8" th:text="${#numbers.formatCurrency(item.valorTotal)}">R$ 0,00</dd>
                    </dl>

                    <form th:action="@{/vendas/{vendaId}/itens/{itemId}/cancelar(vendaId=${venda.id},itemId=${item.id})}" th:object="${cancelamentoVendaItemForm}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="alert alert-warning" role="alert">
                            Apenas este item sera cancelado e estornado no estoque.
                        </div>

                        <div class="mb-4">
                            <label for="motivoCancelamento" class="form-label">Motivo do cancelamento</label>
                            <textarea th:field="*{motivoCancelamento}" class="form-control" th:errorclass="is-invalid" id="motivoCancelamento" rows="3" maxlength="255"></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('motivoCancelamento')}" th:errors="*{motivoCancelamento}"></div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg">Confirmar cancelamento do item</button>
                            <a th:href="@{/vendas/{id}(id=${venda.id})}" class="btn btn-outline-secondary">Voltar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
