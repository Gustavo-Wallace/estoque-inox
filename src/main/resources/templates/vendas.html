<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vendas - Estoque Inox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="py-4">
    <div class="container">
        <div class="d-flex flex-column flex-sm-row justify-content-between gap-3 mb-4">
            <div>
                <h1 class="fw-bold mb-1" th:text="${isAdmin} ? 'Vendas' : 'Minhas vendas'">Vendas</h1>
                <p class="text-secondary mb-0">Vendas registradas da mais recente para a mais antiga.</p>
            </div>
            <div class="d-grid d-sm-flex gap-2">
                <a th:href="@{/dashboard}" class="btn btn-outline-primary">Painel</a>
                <a th:href="@{/vendas/nova}" class="btn btn-primary">Nova venda</a>
            </div>
        </div>

        <div th:if="${sucesso}" class="alert alert-success" role="alert" th:text="${sucesso}"></div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th scope="col">Data/hora</th>
                            <th scope="col">Código</th>
                            <th scope="col">Produto</th>
                            <th scope="col">Qtd.</th>
                            <th scope="col">Preço unit.</th>
                            <th scope="col">Total</th>
                            <th scope="col">Pagamento</th>
                            <th scope="col">Status</th>
                            <th scope="col">Usuária</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="venda : ${vendas}">
                            <td th:text="${#temporals.format(venda.criadoEm, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:00</td>
                            <td class="fw-semibold" th:text="${venda.produto.codigo}">COD</td>
                            <td th:text="${venda.produto.nome}">Produto</td>
                            <td th:text="${venda.quantidade}">1</td>
                            <td th:text="${#numbers.formatCurrency(venda.precoUnitario)}">R$ 0,00</td>
                            <td th:text="${#numbers.formatCurrency(venda.valorTotal)}">R$ 0,00</td>
                            <td th:text="${venda.formaPagamento}">PIX</td>
                            <td>
                                <span class="badge text-bg-success" th:text="${venda.status}">CONCLUIDA</span>
                            </td>
                            <td th:text="${venda.usuarioResponsavel}">usuario</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(vendas)}">
                            <td colspan="9" class="text-center text-secondary py-4">Nenhuma venda registrada.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
